{% extends "app_base.html" %}

{% block title %}Audiobooks | StoryVerse AI{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h2 mb-1">Audiobooks</h1>
        <p class="text-muted mb-0">Generate narrated audio from your stories.</p>
    </div>
    <button class="btn btn-success" disabled>
        <i class="bi bi-mic me-1"></i> Generate Audio
    </button>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body text-center py-5 text-muted">
        <i class="bi bi-headphones display-4 d-block mb-3"></i>
        <p class="mb-0">No audiobooks yet. Convert a story to get started.</p>
    </div>
</div>
{% endblock %}
