{% extends "app_base.html" %}

{% block title %}Profile | StoryVerse AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h3 mb-4">Your Profile</h1>

                <dl class="row mb-0">
                    <dt class="col-sm-4">Username</dt>
                    <dd class="col-sm-8">{{ user.username }}</dd>

                    <dt class="col-sm-4">Email</dt>
                    <dd class="col-sm-8">{{ user.email|default:"—" }}</dd>

                    <dt class="col-sm-4">Member since</dt>
                    <dd class="col-sm-8">{{ user.date_joined|date:"F j, Y" }}</dd>

                    <dt class="col-sm-4">Bio</dt>
                    <dd class="col-sm-8">{{ profile.bio|default:"No bio yet." }}</dd>
                </dl>
            </div>
        </div>
    </div>
</div>
{% endblock %}
